<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email System Test | Job Order Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-highlight: #818cf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-highlight);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-box {
            margin-top: 32px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            text-align: left;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }

        .status-success { color: #4ade80; border-color: rgba(74, 222, 128, 0.2); }
        .status-error { color: #f87171; border-color: rgba(248, 113, 113, 0.2); }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .config-note {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="loader" id="loader"></div>
            <h1>Email System Test</h1>
            <p>Trigger a manual daily report to verify your SMTP and Supabase configurations.</p>
            
            <button class="btn" id="testBtn">Send Test Report Now</button>
            
            <div class="status-box" id="statusBox"></div>
            
            <div class="config-note">
                Ensure SMTP_USER and SMTP_PASS are set in your .env file before testing.
            </div>
        </div>
    </div>

    <script>
        const testBtn = document.getElementById('testBtn');
        const statusBox = document.getElementById('statusBox');
        const loader = document.getElementById('loader');

        testBtn.addEventListener('click', async () => {
            testBtn.disabled = true;
            statusBox.style.display = 'block';
            statusBox.className = 'status-box';
            statusBox.innerHTML = '> Initializing report generation...';
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/test-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok) {
                    statusBox.className = 'status-box status-success';
                    statusBox.innerHTML = `> Success!\n> Users Processed: ${data.totalUsers || 0}\n> Orders Found: ${data.totalOrders || 0}\n> Emails sent successfully.`;
                } else {
                    throw new Error(data.error || 'Server error');
                }
            } catch (error) {
                statusBox.className = 'status-box status-error';
                statusBox.innerHTML = `> Error: ${error.message}\n\nCheck server logs for details. Make sure SMTP credentials are correct.`;
            } finally {
                testBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
